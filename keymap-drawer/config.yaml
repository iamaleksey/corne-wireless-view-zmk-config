parse_config:
  raw_binding_map:
    "&caps_word": Caps Word
    "LS(LA(LC(LCMD)))": Hyper

  zmk_keycode_map:
    # Symbols
    GRAVE: "`"
    TILDE: "~"
    EXCL: "!"
    AT: "@"
    HASH: "#"
    DLLR: $
    PRCNT: "%"
    CARET: ^
    AMPS: "&"
    STAR: "*"
    LPAR: (
    RPAR: )
    MINUS: "-"
    UNDER: _
    EQUAL: "="
    PLUS: "+"
    LBKT: "["
    LBRC: "{"
    RBKT: "]"
    RBRC: "}"
    BSLH:
      tap: '\'
      shifted: "|"
    PIPE: "|"
    SEMI:
      tap: ";"
      shifted: ":"
    SQT:
      tap: "'"
      shifted: '"'
    COMMA:
      tap: ","
      shifted: "<"
    DOT:
      tap: "."
      shifted: ">"
    FSLH:
      tap: "/"
      shifted: "?"

    # Navigation
    UP: $$mdi:arrow-up-bold$$
    DOWN: $$mdi:arrow-down-bold$$
    LEFT: $$mdi:arrow-left-bold$$
    RIGHT: $$mdi:arrow-right-bold$$
    PG_UP: $$mdi:transfer-up$$
    PG_DN: $$mdi:transfer-down$$

    # Modifiers
    LALT: Opt
    RALT: Opt
    LCTRL: Ctrl
    RCTRL: Ctrl
    LCMD: Cmd
    RCMD: Cmd
    LSHFT: Shift
    RSHFT: Shift

draw_config:
  append_colon_to_layer_header: false
